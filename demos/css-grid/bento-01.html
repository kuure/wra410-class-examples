<html lang="en">

<head>

	<title>CSS Bento Box</title>

	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}


		body {
			font-family: sans-serif;
		}

		.container {
			--cols: 5;
			--rows: 3;
			--border-radius: 1rem;
			--gap: 1rem;
			display: grid;
			grid-template-columns: repeat(var(--cols), 1fr);
			grid-template-rows: repeat(var(--rows), 1fr);
			aspect-ratio: var(--cols) / var(--rows);
		}

		.box {
			border: 1px solid blue;
		}

	</style>



</head>

<body>


	<div class="container">

		<div class="box box1">
			Box 1
		</div>


		<div class="box box2">
			Box 2
		</div>


		<div class="box box3">
			Box 3
		</div>


		<div class="box box4">
			Box 4
		</div>


		<div class="box box5">
			Box 5
		</div>


		<div class="box box6">
			Box 6
		</div>


		<div class="box box7">
			Box 7
		</div>


		<div class="box box8">
			Box 8
		</div>


		<div class="box box9">
			Box 9
		</div>


		<div class="box box10">
			Box 10
		</div>


		<div class="box box11">
			Box 11
		</div>


		<div class="box box12">
			Box 12
		</div>


	</div>

</body>

</html>
