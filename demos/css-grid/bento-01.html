<html lang="en">

<head>

	<title>CSS Bento Box</title>

	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}


		body {
			font-family: sans-serif;
		}

		.container {

			display: grid;
	

		}


		.box1 {
			grid-area: box1;
		}
		.box2 {
			grid-area: box2;
		}
				.box3 {
			grid-area: box3;
		}
				.box4 {
			grid-area: box4;
		}
				.box5 {
			grid-area: box5;
		}
				.box6 {
			grid-area: box6;
		}
				.box7 {
			grid-area: box7;
		}
				.box8 {
			grid-area: box8;
		}
				.box9 {
			grid-area: box9;
		}
				.box10 {
			grid-area: box10;
		}
				.box11 {
			grid-area: box11;
		}
				.box12 {
			grid-area: box12;
		}


	</style>



</head>

<body>


	<div class="container">

		<div class="box box1">
			Box 1
			<p>hi there</p>
			<p>again</p>
		</div>


		<div class="box box2">
			Box 2
		</div>


		<div class="box box3">
			Box 3
		</div>


		<div class="box box4">
			Box 4
		</div>


		<div class="box box5">
			Box 5
		</div>


		<div class="box box6">
			Box 6
		</div>


		<div class="box box7">
			Box 7
		</div>


		<div class="box box8">
			Box 8
		</div>


		<div class="box box9">
			Box 9
		</div>


		<div class="box box10">
			Box 10
		</div>


		<div class="box box11">
			Box 11
		</div>


		<div class="box box12">
			Box 12
		</div>


	</div>

</body>

</html>
