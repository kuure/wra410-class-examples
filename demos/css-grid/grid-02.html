<!doctype html>

<html>

<head>

	<meta charset="utf-8">

	<title>CSS Grid Demo 2</title>

	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: sans-serif;
		}

		.container {

			/* tell this box to behave as a grid container */
			display: grid;

			/* draw 4 columns in fr units - all equal width */
			grid-template-columns: 1fr 1fr 1fr 1fr;

			/* make rows at least 100px tall, auto stretch to fit content */
			grid-auto-rows: minmax(100px, auto);

			/* gap between grid items */
			grid-gap: 1em;

		}

		.box {
			padding: 2rem;
		}

		.box1 {
			grid-column: 1/3;
			/* stretch this element from "lines" 1-3 horizontally, effectively spanning two columns */
			grid-row: 1/3;
			/* stretch this grid from "lines" 1-3 vertically, effectively spanning two rows. Note that this causes it to overlap with another element */
			background-color: lightblue;
		}

		.box2 {
			grid-column: 2;
			/* live in column 2 */
			grid-row: 2/4;
			/* span two rows */
			background-color: pink;

		}

		.box3 {
			grid-column: 3;
			/* live in column 3 */
			grid-row: 3;
			/* live in row 3 */
			background-color: yellow;
		}

		.box4 {
			grid-column: 1/5;
			/* span all existing columns */
			grid-row: 4;
			/* live in row 4 */
			background-color: lightgrey;
		}

	</style>

</head>

<body>


	<h1>CSS Grid Demo 02</h1>

	<div class="container">
		<div class="box box1">Box 1</div>
		<div class="box box2">Box 2</div>
		<div class="box box3">Box 3</div>
		<div class="box box4">Box 4</div>
	</div>


</body>

</html>
