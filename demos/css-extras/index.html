<!DOCTYPE html>

<html lang="en-US">

	<head>

		<title>CSS Extas</title>

		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<link rel="stylesheet" href="stylesheet.css">


	</head>


	<body>

		<main>
			
			<h1>This is a Page</h1>

			<section>
				<h1>This is a Box</h1>
				<p>There isn't much stuff in this box, maybe a couple of words but
				that's about it</p>
			</section>

			<section>
				<h1>This is second Box</h1>
				<p>This is basically the same, but has one other thing in it; a
					list:</p>
				<ul>
					<li>Item One</li>
					<li>Item Two</li>
				</ul>

			</section>

			<section class="container">
				<h1>This is third Box</h1>
				<p>This is set up as a container for query purposes</p>
			</section>

		</main> 
	</body>

</html>
