<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Image Magnification</title>

	<style>

		/* reset */
		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		/* you can define variables here and use them elsewhere */
		:root {
			--zoom-level: 2;
			--circle-size: 300px;
			--accent-color: rgb(200, 0, 200);
			--bg-color: rgb(250, 220, 150);
			--shadow-color: rgba(0, 0, 0,0.4);
		}

		body {
			background-color: var(--bg-color);
			height: 100vh;
			width: 100%;
			overflow: hidden;
		}

		/* this is a class with a number of useful positioning properties
		   in this example it's applied to the <header> element  */
		.center {
			width: 100%;
			height: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* the main container element - it has a border to make it 
			 stand out and it is sized based on the --circle-size variable */
		.photoContainer {
			border: 1px solid var(--accent-color);
			width: calc(var(--circle-size) * 4);
			position: relative;
		}

		/* the image */
		.photoContainer img {
			max-width: 100%;
			display: block;
		}

		/* the div with the photo as a background element - this
			 essentially serves as the magnifying "glass" */
		.photoBackground {

			/* borders and shadows for style using variables */
			border: 10px solid var(--accent-color);
			box-shadow: 10px 10px 20px var(--shadow-color);

			/* size is based on the variable */
			width: var(--circle-size);
			height: var(--circle-size);

			/* how much to zoom in on hover? */
			scale: var(--zoom-level);

			/* this makes any square into a circle */
			border-radius: 50%;

			/* these control positioning */
			top: 0;
			left: 0;
			position: absolute;

			/* hide this by default, only show based on events */
			display: none;
		}


		.border {
			border: 2px solid blue;
			height: 100%;
		}

	</style>
</head>

<body>

	<header class="center">
		<div class="photoContainer">
			<div class="border">
			<img src="calumet.jpg" class="photoImage" alt="Calumet, Michigan" />

				<div class="photoBackground" style="background:
					url(calumet.jpg) no-repeat"></div>

			</div>
		</div>
	</header>


	<script>

		// first, what elements do we need to pay attention to?	


		// the outer photo container div
		const photoContainer = document.querySelector(".photoContainer");

		// the div with the image as a background
		const photoBackground = document.querySelector(".photoBackground");

		// the image itself 
		const photoImage = document.querySelector(".photoImage");


		// make a new html <img> based on the original one
		const originalImage = new Image();
		originalImage.src = photoImage.src;




		// second, what user interaction do we want to listen for?


		// listen for the mouse to move over photoContainer
		photoContainer.addEventListener("mousemove", (e) => {
			// when that happens, pass the event to the function below
			magnifyEffect(e);
		});




		// finally, what do we want to do when that interaction happens?


		// the main function that does all the things
		// it is passed the event information as an argument
		function magnifyEffect(e) {

			// .getBoundingClientRect() is a built-in tool that gives you a
			// lot of data about an element's location. This syntax extracts 
			// four of the values and puts them into variable with the same name
			let {left, top, width, height} = photoContainer.getBoundingClientRect();


			// clientX and clientY are the x/y coordinates of the event inside
			// the viewport; to get the location inside the parent element, 
			// you need to do some math based on the dimensions of the photoContainer
			let relativePositionX = e.clientX - left;
			let relativePositionY = e.clientY - top;

			// if the cursor is within the boundaries of the element, display
			// as a block level element
			if (relativePositionX > 0 &&
				relativePositionY > 0 &&
				relativePositionX < width &&
				relativePositionY < height) {
				photoBackground.style.display = "block";
			}
			// otherwise don't display it at all
			else {
				photoBackground.style.display = "none";
			}



			// if it is displayed...
			if (photoBackground.style.display === "block") {
				// set the left and top locations of the "glass" 
				photoBackground.style.left = relativePositionX - photoBackground.clientWidth / 2 + "px";
				photoBackground.style.top = relativePositionY - photoBackground.clientHeight / 2 + "px";

				// find the background X position
				let bgPositionX =
					// round down the results
					Math.round(
						(relativePositionX / photoImage.clientWidth) 
						* originalImage.width - photoBackground.clientWidth / 2 
					) * -1;

				// find the background Y position
				let bgPositionY =
					Math.round(
						(relativePositionY / photoImage.clientHeight) 
						* originalImage.height - photoBackground.clientHeight / 2
					) * -1;

				// position the background accordingly
				photoBackground.style.backgroundPosition = `${bgPositionX}px ${bgPositionY}px`;
			}
		}

	</script>
</body>

</html>
