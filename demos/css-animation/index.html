<!doctype html>

<html lang="en-US">
	<head>
		<title>CSS Animation</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<style>
			p {
				/* animation settings */
				animation-duration: 3s;
				animation-name: slide-in;
				animation-iteration-count: 3;
				animation-direction: alternate;
			}

			p span {
				/* animation settings */
				animation-duration: 3s;
				animation-name: grow-shrink;
				animation-iteration-count: infinite;
				/* default is inline */
				display: inline-block;
			}

			/* 'slide-in' defintion */
			@keyframes slide-in {
				from {
					translate: 100vw 0;
					scale: 200% 1;
				}

				to {
					translate: 0 0;
					scale: 100% 1;
				}
			}

			/* 'grow-shrink' defintion */
			@keyframes grow-shrink {
				25%,
				75% {
					scale: 100%;
				}

				50% {
					scale: 200%;
					color: magenta;
				}
			}
		</style>
	</head>

	<body>
		<h1>CSS Animation</h1>

		<p>
			The Caterpillar and <span>Alice ❤️</span> looked at each other for some
			time in silence: at last the Caterpillar took the hookah out of its mouth,
			and addressed her in a languid, sleepy voice.
		</p>

		<script>

			const element = document.querySelector('p');

			let count = 0;

			// event listeners

			// animation starts
			element.addEventListener('animationstart', () => {
				console.log('animation started');
			});

			// animation stops
			element.addEventListener('animationend', () => {
				console.log('animation stopped');
			});

			// on every loop...
			element.addEventListener('animationiteration', () => {
				console.log(`animation count: ${count++}`);
			});

		</script>

	</body>
</html>
