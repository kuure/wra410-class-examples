<!DOCTYPE html>

<html lang="en-US">

<head>

<title></title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="">

<style>

.dark {
	background-color: black;
	color: white;
}

.light {
	background-color: white;
	color: black;
}

</style>

</head>

<body class="light">

	<h1>Toggling Classes</h1>

	<button>Click Me For Dark Mode</button>


	<script>

		const button = document.querySelector("button")
		const body = document.querySelector("body")

		let mode = "light"


		button.addEventListener("click",(event) => handleButtonClick(event) )

		function handleButtonClick(event) {
			


			console.log(event)
/*

check mode value

			if mode equals "light" then:
				change css class of body from light to dark
				change value of variable from light to dark
				change text in button from dark to light

			else 
				change css class of body from light to light
				change value of variable from light to light
				change text in button from light to dark

*/



			if(mode === 'light') {
				body.classList.replace("light","dark")
				button.innerHTML = "Click Me For Light Mode"
				mode = 'dark'
			}

			else {
				body.classList.replace("dark","light")
				button.innerHTML = "Click Me For Dark Mode"
				mode = 'light'
			}

	}


	</script>
	

</body>

</html>
