<!DOCTYPE html>

<html lang="en">

	<head>

		<title>WRA410 Navbar With Object</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

	</head>

	<body>


		<nav>
			<ul class="container"></ul>
		</nav>



		<script>

			const container = document.querySelector(".container");

			const navLinks = [
				{ text: "Home", url: "/"},
				{ text: "About", url: "/about"},
				{ text: "Contact", url: "/contact"},
				{ text: "Portfolio", url: "/portfolio"},
			];

			function makeMeANavBar(navArrayOfObjects) {

				console.log(navArrayOfObjects);

				let newNavItems = navArrayOfObjects.map(link => {

					return(
						`<li class="current"><a href="${link.url}">${link.text}</a></li>`
					)
				})
				.join('')

				container.innerHTML = newNavItems;

				console.log(newNavItems)

			}

			makeMeANavBar(navLinks);



		</script>




	</body>
</html>
