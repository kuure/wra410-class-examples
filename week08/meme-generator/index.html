<!doctype html>

<html lang="en">

	<head>

		<title>Meme Generator</title>

		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="css/meme-generator.css">

	</head>

	<body>

		<div class="container">

			<h1>Meme Generator</h1>

			<div class="textBoxes">
				<div>
					<label for="noInput">No Text:</label>
					<input type="text" name="noInput" id="noInput">
				</div>
				<div>
					<label for="yesInput">Yes Text:</label>
					<input type="text" name="yesInput" id="yesInput">
				</div>
			</div>

			<div class="images">

				<div class="no">
					<img src="img/no.png" alt="Drake Says No">
					<p class='noText'>No Text Goes Here...</p>
				</div>

				<div class="yes">
					<img src="img/yes.png" alt="Drake Says Yes">
					<p class='yesText'>Yes Text Goes Here...</p>
				</div>

			</div>

		</div>

		<script src="js/meme-generator.js"></script>

	</body>
</html>
