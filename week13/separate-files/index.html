<!DOCTYPE html>

<html lang="en-US">

<head>

	<title>Multiple CSS and JS Files</title>

	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="stylesheet" href="style1.css">
	<link rel="stylesheet" href="style2.css">

</head>

<body>

	<h1>Multiple CSS and JS Files</h1>

	<p>One CSS file sets the body rules, and a second sets the rules for the
	H1 element.</p>
	
	<p>There are also two linked JavaScript files, one each adding text
	below:</p>


	<p class="one"></p>
	<p class="two"></p>

	<script src="script1.js"></script>
	<script src="script2.js"></script>

</body>
</html>
