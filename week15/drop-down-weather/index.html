<!doctype html>

<html lang="en-US">

<head>

	<title>Drop Down Weather Selector</title>

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="stylesheet" href="stylesheet.css">


</head>

<body>

	<p>Pick a forecast and the background will change based on the
	temperature.</p>

	<select>
		<option value="0">Today</option>
		<option value="2">Tomorrow</option>
		<option value="4">The Day After</option>
	</select>


	<div class="container"></div>

	<script src="script.js"></script>


</body>

</html>
